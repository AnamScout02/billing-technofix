# ============================================================
# Contoh konfigurasi Apache VirtualHost — TechnoFix di Proxmox
# ============================================================
#
# Asumsi:
#   - Project di-clone ke /opt/technofix (DocumentRoot = root project,
#     karena semua path frontend memakai prefix absolut "/app/frontend/...")
#   - Backend Flask jalan via systemd di 127.0.0.1:5000
#     (lihat deploy/technofix-backend.service)
#   - IP lokal VM: 172.15.0.11, domain rencana: technofix-bill.com
#
# Aktifkan module yang dibutuhkan dulu:
#   sudo a2enmod proxy proxy_http headers rewrite
#
# Lalu copy file ini ke /etc/apache2/sites-available/technofix.conf
# dan aktifkan:
#   sudo a2ensite technofix.conf
#   sudo systemctl reload apache2
# ============================================================

<VirtualHost *:80>
    ServerName technofix-bill.com
    ServerAlias www.technofix-bill.com 172.15.0.11

    DocumentRoot /opt/technofix

    <Directory /opt/technofix>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Jangan expose source code backend & database SQLite ──
    <Directory /opt/technofix/app/backend>
        Require all denied
    </Directory>
    <Directory /opt/technofix/app/database>
        Require all denied
    </Directory>
    <FilesMatch "\.(db|py|pyc)$">
        Require all denied
    </FilesMatch>

    # ── Reverse proxy ke Flask (gunicorn/dev-server) di 127.0.0.1:5000 ──
    # Frontend & backend jadi satu origin → CORS tidak diperlukan
    # (global.js fallback API_BASE='' otomatis pakai same-origin ini).
    ProxyPreserveHost On

    ProxyPass        /api      http://127.0.0.1:5000/api
    ProxyPassReverse /api      http://127.0.0.1:5000/api

    ProxyPass        /olt      http://127.0.0.1:5000/olt
    ProxyPassReverse /olt      http://127.0.0.1:5000/olt

    ProxyPass        /devices  http://127.0.0.1:5000/devices
    ProxyPassReverse /devices  http://127.0.0.1:5000/devices

    ErrorLog  ${APACHE_LOG_DIR}/technofix-error.log
    CustomLog ${APACHE_LOG_DIR}/technofix-access.log combined
</VirtualHost>

# ============================================================
# Setelah domain technofix-bill.com aktif & DNS sudah mengarah ke
# server ini, jalankan certbot untuk HTTPS otomatis:
#   sudo apt install certbot python3-certbot-apache
#   sudo certbot --apache -d technofix-bill.com -d www.technofix-bill.com
# certbot akan membuat blok <VirtualHost *:443> baru otomatis.
# ============================================================
