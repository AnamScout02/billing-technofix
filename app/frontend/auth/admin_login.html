<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — TechnoFix-Bill</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..200&display=block" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #0040a1;
      --primary-dark: #002f7a;
      --text:         #0f1e3d;
      --text-muted:   #4a5a7a;
      --text-dim:     #8a9ab8;
      --border:       #dde3f0;
      --surface:      #f4f6fb;
      --red:          #ba1a1a;
      --red-bg:       #fde8e8;
      --red-border:   #f3b4b4;
      --green:        #006c47;
      --green-bg:     #e6f4ee;
      --green-border: #a3d9c0;
      --sans:         'Poppins', sans-serif;
      --heading:      'Montserrat', sans-serif;
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
    }

    html, body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1e;
      padding: 24px 16px;
      position: relative;
    }

    /* â”€â”€ Background grid â”€â”€ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,64,161,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,64,161,.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,64,161,.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,174,239,.10) 0%, transparent 50%);
      pointer-events: none;
    }

    /* â”€â”€ Card â”€â”€ */
    .admin-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      padding: 36px 32px 32px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,.1);
      animation: cardIn .4s cubic-bezier(.22,1,.36,1) both;
    }

    /* Watermark motif "F" (identitas TechnoFix-Bill), recolor jadi abu/putih
       transparan agar menyatu dengan kartu glassmorphism gelap */
    .admin-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('/app/frontend/statis/mockup/pattern.png');
      background-repeat: repeat;
      background-size: 220px auto;
      filter: invert(1) grayscale(1);
      opacity: .04;
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* â”€â”€ Header â”€â”€ */
    .admin-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .admin-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0040a1, #0059d6);
      border: 1px solid rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(0,64,161,.4);
    }

    .admin-icon .material-symbols-outlined { font-size: 28px; }

    .admin-title {
      font-size: 22px;
      font-weight: 800;
      font-family: var(--heading);
      color: #fff;
      letter-spacing: -.04em;
      margin-bottom: 4px;
    }

    .admin-sub {
      font-size: 13px;
      color: rgba(255,255,255,.45);
    }

    /* â”€â”€ Alert â”€â”€ */
    .admin-alert {
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 13px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      border: 1px solid;
      line-height: 1.5;
      animation: fadeIn .2s ease;
    }

    .admin-alert.show { display: flex; }

    .admin-alert .material-symbols-outlined { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .admin-alert.error {
      background: rgba(186,26,26,.15);
      color: #ff8a8a;
      border-color: rgba(186,26,26,.3);
    }

    .admin-alert.success {
      background: rgba(0,108,71,.15);
      color: #5ccfa0;
      border-color: rgba(0,108,71,.3);
    }

    /* â”€â”€ Form â”€â”€ */
    .admin-fields { display: flex; flex-direction: column; gap: 14px; }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.55);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--r-md);
      color: #fff;
      font-size: 14px;
      font-family: var(--sans);
      outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }

    .field-input::placeholder { color: rgba(255,255,255,.25); }

    .field-input:focus {
      border-color: rgba(0,89,214,.7);
      background: rgba(255,255,255,.09);
      box-shadow: 0 0 0 3px rgba(0,64,161,.25);
    }

    /* Password wrap */
    .field-pwd-wrap { position: relative; }

    .field-pwd-wrap .field-input { padding-right: 44px; }

    .field-pwd-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,.35);
      padding: 2px;
      display: flex;
      transition: color .15s;
    }

    .field-pwd-toggle:hover { color: rgba(255,255,255,.7); }
    .field-pwd-toggle .material-symbols-outlined { font-size: 18px; }

    /* â”€â”€ Submit â”€â”€ */
    .btn-admin {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      background: linear-gradient(135deg, #0040a1, #0059d6);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--sans);
      cursor: pointer;
      letter-spacing: .01em;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(0,64,161,.4);
    }

    .btn-admin::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.1), transparent);
      pointer-events: none;
    }

    .btn-admin .material-symbols-outlined { font-size: 18px; }

    .btn-admin:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,64,161,.5);
    }

    .btn-admin:active { transform: scale(.98); }
    .btn-admin:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    .btn-admin.loading .btn-spinner { display: block; }
    .btn-admin.loading .btn-label   { display: none; }

    /* â”€â”€ Footer â”€â”€ */
    .admin-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255,255,255,.2);
    }

    /* â”€â”€ Setup panel (first-time) â”€â”€ */
    .setup-notice {
      display: none;
      background: rgba(0,64,161,.15);
      border: 1px solid rgba(0,89,214,.3);
      border-radius: var(--r-md);
      padding: 12px 14px;
      margin-bottom: 18px;
      gap: 9px;
      align-items: flex-start;
      font-size: 12.5px;
      color: rgba(255,255,255,.7);
      line-height: 1.6;
    }

    .setup-notice.show { display: flex; }
    .setup-notice .material-symbols-outlined { font-size: 16px; color: #60a5fa; flex-shrink: 0; margin-top: 1px; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Branding subtle */
    .admin-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
      opacity: .35;
    }

    .admin-brand .material-symbols-outlined { font-size: 16px; color: #fff; }
    .admin-brand span { font-size: 12px; color: #fff; font-weight: 600; font-family: var(--heading); }
  </style>
</head>
<body>

  <div class="admin-card">

    <!-- Subtle brand -->
    <div class="admin-brand">
      <img src="/app/frontend/statis/technofixlogo.png" alt="TechnoFix-Bill" style="width:28px;height:28px;object-fit:contain;border-radius:6px">
      <span>TechnoFix-Bill</span>
    </div>

    <!-- Header -->
    <div class="admin-header">
      <div class="admin-icon">
        <span class="material-symbols-outlined">admin_panel_settings</span>
      </div>
      <div class="admin-title">Admin Panel</div>
      <div class="admin-sub">Akses terbatas — pengelola sistem</div>
    </div>

    <!-- Setup notice (muncul saat belum ada superadmin) -->
    <div class="setup-notice" id="setup-notice">
      <span class="material-symbols-outlined">info</span>
      <div>Belum ada akun superadmin. Isi form di bawah untuk membuat akun pertama. <strong style="color:#fff">Endpoint ini akan dinonaktifkan otomatis setelah akun dibuat.</strong></div>
    </div>

    <!-- Alert -->
    <div class="admin-alert" id="admin-alert">
      <span class="material-symbols-outlined">error</span>
      <span id="admin-alert-msg"></span>
    </div>

    <!-- Fields -->
    <div class="admin-fields">
      <div>
        <label class="field-label" for="admin-username">Username</label>
        <input type="text" class="field-input" id="admin-username"
          placeholder="Username superadmin"
          autocomplete="username" autocapitalize="none" spellcheck="false" />
      </div>

      <div>
        <label class="field-label" for="admin-password">Password</label>
        <div class="field-pwd-wrap">
          <input type="password" class="field-input" id="admin-password"
            placeholder="Password" autocomplete="current-password" />
          <button type="button" class="field-pwd-toggle" onclick="togglePwd()" title="Tampilkan password">
            <span class="material-symbols-outlined" id="pwd-eye">visibility</span>
          </button>
        </div>
      </div>
    </div>

    <button class="btn-admin" id="btn-submit" onclick="handleSubmit()">
      <span class="btn-spinner"></span>
      <span class="btn-label" style="display:flex;align-items:center;gap:7px;">
        <span class="material-symbols-outlined">lock_open</span>
        <span id="btn-text">Masuk</span>
      </span>
    </button>

    <div class="admin-footer">Halaman ini tidak diindeks &nbsp;Â·&nbsp; TechnoFix-Bill v2.0</div>
  </div>

  <script>
    'use strict';

    /* API_BASE inline — halaman superadmin MANDIRI, tidak memuat global.js
       agar tidak ada skrip lain yang bisa mengalihkan halaman ini. */
    const API_BASE = (function () {
      const h = window.location.hostname;
      if (h === 'localhost' || h === '127.0.0.1') return 'http://127.0.0.1:5000';
      if (h === '192.168.70.7')                   return 'http://192.168.70.7:5000';
      // 172.15.0.11, 103.194.175.54, technofix-bill.com & lainnya → fallback di bawah:
      // production (Proxmox): pakai Apache reverse proxy, same origin (port 5000 diblokir ufw dari luar)
      return '';
    })();

    const ADMIN_API = `${API_BASE}/api/auth/admin`;
    const DASHBOARD    = '/app/frontend/superadmin/superadmin.html';
    let   isSetupMode  = false;

    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       1. CEK SESSION & STATUS SETUP
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
    (async function init() {
      // Cek apakah sudah login
      try {
        const res = await fetch(`${ADMIN_API}/me`, { credentials: 'include' });
        if (res.ok) {
          window.location.replace(DASHBOARD);
          return;
        }
      } catch { /* offline atau belum login */ }

      // Cek apakah superadmin pertama sudah ada
      // Kita coba login dengan data kosong — kalau error 403 "Setup sudah pernah"
      // berarti sudah ada. Kalau error lain = belum ada akun.
      // Cara lebih bersih: tambahkan endpoint GET /admin/status di backend.
      // Tapi cukup gunakan endpoint setup dengan metode GET (lihat catatan di bawah).
      try {
        const res  = await fetch(`${ADMIN_API}/setup`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ _probe: true }),
        });
        const data = await res.json();

        // Jika 403 "Setup sudah pernah" â†’ mode login biasa
        // Jika 400 "Username wajib" â†’ belum ada superadmin â†’ setup mode
        if (res.status === 400 && data.message === 'Username wajib diisi') {
          isSetupMode = true;
          document.getElementById('setup-notice').classList.add('show');
          document.getElementById('btn-text').textContent = 'Buat Akun Superadmin';
          document.getElementById('admin-password').placeholder = 'Password (min. 8 karakter)';
        }
      } catch { /* abaikan */ }
    })();


    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       2. SUBMIT — Login atau Setup
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
    async function handleSubmit() {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;

      if (!username || !password) {
        showAlert('error', 'Username dan password wajib diisi');
        return;
      }

      const btn = document.getElementById('btn-submit');
      setLoading(btn, true);
      hideAlert();

      try {
        const endpoint = isSetupMode ? `${ADMIN_API}/setup` : `${ADMIN_API}/login`;
        const res      = await fetch(endpoint, {
          method:      'POST',
          headers:     { 'Content-Type': 'application/json' },
          credentials: 'include',
          body:        JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (res.ok && data.status === 'success') {
          showAlert('success', isSetupMode
            ? 'Akun superadmin berhasil dibuat! Silakan login.'
            : `Selamat datang, ${data.username}! Mengalihkan...`
          );

          if (isSetupMode) {
            // Setelah setup, switch ke mode login
            setTimeout(() => {
              isSetupMode = false;
              document.getElementById('setup-notice').classList.remove('show');
              document.getElementById('btn-text').textContent = 'Masuk';
              document.getElementById('admin-password').placeholder = 'Password';
              document.getElementById('admin-username').value = username;
              document.getElementById('admin-password').value = '';
              hideAlert();
              setLoading(btn, false);
            }, 1800);
          } else {
            // Bersihkan sisa session ISP lama agar tidak konflik
            ['technofix_user','tf_token','tf_user_id','tf_username',
             'tf_role','tf_network_id','tf_isp_name','tf_permissions']
              .forEach(k => localStorage.removeItem(k));

            // Simpan sebagai role 'owner' agar global.js (applyRbacUi)
            // membuka SEMUA menu — owner = akses penuh
            localStorage.setItem('tf_token',       data.username);
            localStorage.setItem('tf_user_id',     data.username);
            localStorage.setItem('tf_username',    data.username);
            localStorage.setItem('tf_role',        'owner');
            localStorage.setItem('tf_network_id',  '__superadmin__');
            localStorage.setItem('tf_isp_name',    'TechnoFix-Bill Admin');
            localStorage.setItem('tf_permissions', JSON.stringify([
              'keuangan','maps','olt','mikrotik','pelanggan','perangkat'
            ]));
            localStorage.setItem('technofix_user', JSON.stringify({
              id: data.username, username: data.username,
              role: 'owner', network_id: '__superadmin__',
              isp_name: 'TechnoFix-Bill Admin',
            }));

            setTimeout(() => window.location.replace(DASHBOARD), 800);
          }
        } else {
          showAlert('error', data.message || 'Terjadi kesalahan. Coba lagi.');
          setLoading(btn, false);
        }

      } catch (err) {
        showAlert('error', 'Tidak dapat terhubung ke server.');
        setLoading(btn, false);
      }
    }


    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       3. HELPERS
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
    function showAlert(type, msg) {
      const el  = document.getElementById('admin-alert');
      const txt = document.getElementById('admin-alert-msg');
      const ico = el.querySelector('.material-symbols-outlined');
      el.className  = `admin-alert show ${type}`;
      txt.textContent = msg;
      ico.textContent = type === 'success' ? 'check_circle' : 'error';
    }

    function hideAlert() {
      document.getElementById('admin-alert').className = 'admin-alert';
    }

    function setLoading(btn, on) {
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }

    function togglePwd() {
      const input = document.getElementById('admin-password');
      const eye   = document.getElementById('pwd-eye');
      if (input.type === 'password') {
        input.type = 'text';
        eye.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        eye.textContent = 'visibility';
      }
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
